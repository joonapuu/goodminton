<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Goodminton">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <title>Goodminton</title>

  <!-- MediaPipe Hands (for camera gesture detection) -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
  <!-- camera_utils removed: using getUserMedia directly for iOS compatibility -->

  <style>
    /* ── Reset ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100dvw;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
      touch-action: none;
    }

    /* ── Scoreboard ─────────────────────────── */
    #scoreboard {
      position: relative;
      display: flex;
      width: 100%;
      height: 100%;
    }

    .team {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #t1 { background: #000; }
    #t2 { background: #000; }

    /* Flash overlay (sits on top of background) */
    .flash-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
    }

    @keyframes flashAdd    { 0%{opacity:.45} 100%{opacity:0} }
    @keyframes flashRemove { 0%{opacity:.55} 100%{opacity:0} }

    #fl1.do-add    { background:#00e5ff; animation: flashAdd    .45s ease-out forwards; }
    #fl2.do-add    { background:#e040fb; animation: flashAdd    .45s ease-out forwards; }
    .flash-layer.do-remove { background:#cc0000; animation: flashRemove .45s ease-out forwards; }

    /* Score number */
    .score-num {
      font-size: min(40vw, 76vh);
      font-weight: 900;
      font-family: 'Arial Black', Impact, 'Helvetica Neue', sans-serif;
      line-height: 1;
      letter-spacing: -0.03em;
    }
    #t1 .score-num { color: #00e5ff; }
    #t2 .score-num { color: #e040fb; }

    @keyframes bump {
      0%   { transform: scale(1); }
      45%  { transform: scale(1.13); }
      100% { transform: scale(1); }
    }
    .score-num.bumping { animation: bump .28s cubic-bezier(.34,1.56,.64,1); }


    /* Swipe hint */
    .swipe-hint {
      position: absolute;
      bottom: 78px;
      font-size: clamp(11px, 1.6vw, 16px);
      text-align: center;
      line-height: 1.8;
      transition: opacity 1s;
      pointer-events: none;
    }
    #t1 .swipe-hint { color: rgba(0, 229, 255, 0.25); }
    #t2 .swipe-hint { color: rgba(224,  64, 251, 0.25); }

    /* Centre divider */
    #divider {
      position: absolute;
      left: 50%;
      top: 0; bottom: 0;
      width: 3px;
      background: rgba(255,255,255,.12);
      transform: translateX(-50%);
      z-index: 5;
      pointer-events: none;
    }

    /* ── Control bar ─────────────────────────── */
    #controls {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 60;
      background: rgba(0,0,0,.58);
      padding: 8px 14px;
      border-radius: 50px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .cbtn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.30);
      background: transparent;
      color: #fff;
      font-size: 19px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, border-color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cbtn:hover  { background: rgba(255,255,255,.18); }
    .cbtn:active { background: rgba(255,255,255,.30); }

    .cbtn.on {
      background: rgba(255,255,255,.22);
      border-color: rgba(255,255,255,.80);
    }

    /* Pulsing red mic when voice is live */
    .cbtn.listening {
      background: rgba(255,50,50,.45);
      border-color: #ff4040;
      animation: micpulse 1.3s ease-in-out infinite;
    }
    @keyframes micpulse {
      0%,100% { box-shadow: 0 0 0 0   rgba(255,64,64,.55); }
      50%      { box-shadow: 0 0 0 11px rgba(255,64,64,0); }
    }

    /* ── Toast ───────────────────────────────── */
    #toast {
      position: fixed;
      top: 22px;
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: rgba(0,0,0,.72);
      color: #fff;
      padding: 8px 22px;
      border-radius: 100px;
      font-size: clamp(13px, 1.9vw, 18px);
      white-space: nowrap;
      z-index: 90;
      opacity: 0;
      transition: opacity .22s, transform .22s;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Gesture dwell progress bar ─────────────────── */
    #dwell-bar-wrap {
      position: fixed;
      bottom: 0;
      height: 40px;
      width: 50%;            /* half the screen — side set via JS */
      background: rgba(255,255,255,.08);
      display: none;
      z-index: 60;
    }
    #dwell-bar {
      height: 100%;
      width: 0%;
      transition: width .05s linear;
    }

    /* ── Keyboard hint (top-right, subtle) ────── */
    #kb-hint {
      position: fixed;
      top: 14px;
      right: 14px;
      color: rgba(255,255,255,.25);
      font-size: 11px;
      text-align: right;
      line-height: 1.75;
      z-index: 55;
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- ═══ Scoreboard ═══════════════════════════════════════ -->
<div id="scoreboard">

  <div class="team" id="t1">
    <div class="flash-layer" id="fl1"></div>
    <div class="score-num" id="s1">0</div>
    <div class="swipe-hint" id="sh1">Tap to score<br>↓ Swipe / hold to undo</div>
  </div>

  <div id="divider"></div>

  <div class="team" id="t2">
    <div class="flash-layer" id="fl2"></div>
    <div class="score-num" id="s2">0</div>
    <div class="swipe-hint" id="sh2">Tap to score<br>↓ Swipe / hold to undo</div>
  </div>

</div>

<!-- ═══ Toast ════════════════════════════════════════════ -->
<div id="toast"></div>

<!-- ═══ Keyboard hint ════════════════════════════════════ -->
<div id="kb-hint">
  1 / Q / ← = Team 1<br>
  2 / W / → = Team 2<br>
  A / S / ↑↓ = undo
</div>

<!-- ═══ Gesture dwell bar ════════════════════════════════ -->
<div id="dwell-bar-wrap"><div id="dwell-bar"></div></div>

<!-- ═══ Controls ═════════════════════════════════════════ -->
<div id="controls">
  <button class="cbtn" id="btn-cam"   title="Toggle camera gestures">📷</button>
  <button class="cbtn" id="btn-voice" title="Toggle voice commands">🎤</button>
  <button class="cbtn" id="btn-reset" title="Hold to reset scores">↺</button>
</div>

<!-- Hidden video for MediaPipe -->
<video id="vid" playsinline muted hidden></video>

<!-- ═══════════════════════════════════════════════════════
     SCRIPT
════════════════════════════════════════════════════════ -->
<script>'use strict';

/* ── State ─────────────────────────────────────────────── */
const scores      = [0, 0];
let cameraOn      = false;
let voiceOn       = false;
let gestureCd     = false;   // gesture cooldown
let voiceCd       = false;   // voice cooldown
let recognition   = null;
let mpHands       = null;
let mpRafId       = null;   // requestAnimationFrame id for camera loop

// Dwell (gesture hold) state
const DWELL_MS    = 1500;
let dwellGesture  = null;    // 'up' | 'palm' | null
let dwellTeam     = -1;
let dwellStart    = 0;
let dwellRafId    = null;

/* ── DOM refs ───────────────────────────────────────────── */
const scoreEls  = [document.getElementById('s1'),  document.getElementById('s2')];
const teamEls   = [document.getElementById('t1'),  document.getElementById('t2')];
const flashEls  = [document.getElementById('fl1'), document.getElementById('fl2')];
const toastEl   = document.getElementById('toast');
const dwellBar  = document.getElementById('dwell-bar');
const dwellWrap = document.getElementById('dwell-bar-wrap');
const vidEl     = document.getElementById('vid');
const btnCam    = document.getElementById('btn-cam');
const btnVoice  = document.getElementById('btn-voice');
const btnReset  = document.getElementById('btn-reset');

/* ── Fade out swipe hints ───────────────────────────────── */
setTimeout(() => {
  document.querySelectorAll('.swipe-hint').forEach(h => { h.style.opacity = '0'; });
}, 5000);

/* ════════════════════════════════════════════════════════
   SCORE MANAGEMENT
════════════════════════════════════════════════════════ */
function changeScore(team, delta, source) {
  const prev = scores[team];
  scores[team] = Math.max(0, scores[team] + delta);
  if (scores[team] === prev) return;

  scoreEls[team].textContent = scores[team];

  // Bump animation
  scoreEls[team].classList.remove('bumping');
  void scoreEls[team].offsetWidth;
  scoreEls[team].classList.add('bumping');
  scoreEls[team].addEventListener('animationend', () =>
    scoreEls[team].classList.remove('bumping'), { once: true });

  // Flash
  const fl = flashEls[team];
  fl.classList.remove('do-add', 'do-remove');
  void fl.offsetWidth;
  fl.classList.add(delta > 0 ? 'do-add' : 'do-remove');
  fl.addEventListener('animationend', () => fl.classList.remove('do-add','do-remove'), { once: true });

  const label = source ? ` (${source})` : '';
  showToast(`Team ${team + 1}: ${delta > 0 ? '+1' : '−1'}${label}`);
}

function resetScores() {
  scores[0] = scores[1] = 0;
  scoreEls.forEach(el => {
    el.textContent = '0';
    el.classList.remove('bumping');
  });
  showToast('Scores reset ↺');
}

/* ════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════ */
let toastTimer = null;
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 10000);
}

/* ════════════════════════════════════════════════════════
   TOUCH / POINTER INPUT
════════════════════════════════════════════════════════ */
const pointers   = new Map();   // id → {x, y, time}
let lpTimer      = null;        // long-press timer
let lpTeam       = -1;

const SWIPE_PX   = 52;
const LP_MS      = 620;

function teamFromX(x) { return x < window.innerWidth / 2 ? 0 : 1; }

function onPtrDown(id, x, y, target) {
  if (target && (target.closest('#controls') || target.closest('#cam-wrap'))) return;
  pointers.set(id, { x, y, time: Date.now() });

  clearTimeout(lpTimer);
  lpTeam = teamFromX(x);
  lpTimer = setTimeout(() => {
    pointers.delete(id);
    changeScore(lpTeam, -1, 'hold');
    lpTimer = null;
  }, LP_MS);
}

function onPtrUp(id, x, y) {
  clearTimeout(lpTimer); lpTimer = null;
  const d = pointers.get(id);
  if (!d) return;
  pointers.delete(id);

  const dy = y - d.y;
  const dx = x - d.x;
  const dt = Date.now() - d.time;
  const team = teamFromX(d.x);

  if (dy > SWIPE_PX && Math.abs(dx) < SWIPE_PX * 1.2) {
    changeScore(team, -1, 'swipe');
  } else if (dt < LP_MS && Math.abs(dy) < 22 && Math.abs(dx) < 22) {
    changeScore(team, 1);
  }
}

// Pointer Events API (covers mouse + touch on modern browsers)
if ('PointerEvent' in window) {
  document.addEventListener('pointerdown', e =>
    onPtrDown(e.pointerId, e.clientX, e.clientY, e.target));
  document.addEventListener('pointerup', e =>
    onPtrUp(e.pointerId, e.clientX, e.clientY));
  document.addEventListener('pointercancel', e => {
    clearTimeout(lpTimer); pointers.delete(e.pointerId);
  });
} else {
  // Fallback for older Safari
  document.addEventListener('touchstart', e => {
    [...e.changedTouches].forEach(t =>
      onPtrDown(t.identifier, t.clientX, t.clientY, e.target));
  }, { passive: true });
  document.addEventListener('touchend', e => {
    [...e.changedTouches].forEach(t =>
      onPtrUp(t.identifier, t.clientX, t.clientY));
  }, { passive: true });
  document.addEventListener('touchcancel', e => {
    clearTimeout(lpTimer);
    [...e.changedTouches].forEach(t => pointers.delete(t.identifier));
  }, { passive: true });
  document.addEventListener('mousedown', e =>
    onPtrDown('mouse', e.clientX, e.clientY, e.target));
  document.addEventListener('mouseup', e =>
    onPtrUp('mouse', e.clientX, e.clientY));
}

/* ════════════════════════════════════════════════════════
   KEYBOARD  (also used by Bluetooth remote mapped to keys)

   Team 1 +1 : 1  Q  ArrowLeft
   Team 2 +1 : 2  W  ArrowRight
   Team 1 −1 : !  A  ArrowDown
   Team 2 −1 : @  S  ArrowUp
   Reset      : Shift+R
════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  switch (e.key) {
    case '1': case 'q': case 'Q': case 'ArrowLeft':
      e.preventDefault(); changeScore(0,  1, 'key'); break;
    case '2': case 'w': case 'W': case 'ArrowRight':
      e.preventDefault(); changeScore(1,  1, 'key'); break;
    case '!': case 'a': case 'A': case 'ArrowDown':
      e.preventDefault(); changeScore(0, -1, 'key'); break;
    case '@': case 's': case 'S': case 'ArrowUp':
      e.preventDefault(); changeScore(1, -1, 'key'); break;
    case 'R':
      if (e.shiftKey) { e.preventDefault(); resetScores(); } break;
  }
});

/* ════════════════════════════════════════════════════════
   VOICE COMMANDS  (Web Speech API)

   Say: "one" / "two"  →  add point
        "minus one" / "minus two"  →  subtract
        "reset" / "new game"  →  reset scores
        "cyan" / "magenta"  →  same as one/two
════════════════════════════════════════════════════════ */
function startVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('⚠ Voice not supported — use Chrome or Edge');
    return false;
  }
  recognition = new SR();
  recognition.continuous      = true;
  recognition.interimResults  = false;
  recognition.lang            = 'fi-FI';

  recognition.onresult = evt => {
    if (voiceCd) return;
    const text = evt.results[evt.results.length - 1][0].transcript
                    .toLowerCase().trim();
    handleVoice(text);
  };
  recognition.onerror = evt => {
    // iOS Safari fires 'not-allowed' briefly during restart — ignore it
    const silent = ['no-speech', 'aborted', 'not-allowed'];
    if (!silent.includes(evt.error))
      showToast(`🎤 Error: ${evt.error}`);
  };
  recognition.onend = () => {
    // iOS Safari stops after every utterance; a short delay prevents a
    // "not-allowed" race condition before restarting
    if (voiceOn) setTimeout(() => {
      try { recognition.start(); } catch {}
    }, 150);
  };

  try { recognition.start(); return true; }
  catch { showToast('Could not access microphone'); return false; }
}

function handleVoice(text) {
  // Finnish commands:
  //   "vasemmalle"         → Team 1 +1
  //   "oikeelle"           → Team 2 +1
  //   "miinus vasemmalle"  → Team 1 −1
  //   "miinus oikeelle"    → Team 2 −1
  //   "nollaa"             → reset
  const minus = /miinus|peruuta/.test(text);
  const isOne = /vasemmalle/.test(text);
  const isTwo = /oikeelle/.test(text);
  const isRst = /nollaa/.test(text);

  if (isRst) { resetScores(); return; }

  let team = -1;
  if (isOne)      team = 0;
  else if (isTwo) team = 1;
  if (team < 0) return;

  changeScore(team, minus ? -1 : 1, 'voice');
  voiceCd = true;
  setTimeout(() => voiceCd = false, 1400);
}

btnVoice.addEventListener('click', () => {
  voiceOn = !voiceOn;
  if (voiceOn) voiceOn = startVoice();
  else { if (recognition) { recognition.stop(); recognition = null; } }
  btnVoice.classList.toggle('on', voiceOn);
  btnVoice.classList.toggle('listening', voiceOn);
  if (voiceOn) showToast('🎤 Ääni päällä  —  sano "vasemmalle" tai "oikeelle"');
  else         showToast('Voice OFF');
});

/* ════════════════════════════════════════════════════════
   CAMERA GESTURE  (MediaPipe Hands)

   Gesture → action:
     Thumbs up   (hold 1.5 s)  →  +1 point
     Open palm   (hold 1.5 s)  →  −1 point  (undo / fix score)

   Team selection:
     Left half of camera preview  →  Team 1 (cyan)
     Right half of camera preview →  Team 2 (magenta)
     (The preview is mirrored, matching natural mirror-like feel)
════════════════════════════════════════════════════════ */
function detectGesture(lm) {
  // Detect open palm: at least 3 of the 4 main fingers clearly extended.
  // Using tip-above-MCP (knuckle) rather than tip-above-PIP for a more
  // forgiving check that works at more hand angles.
  const idxExt  = lm[8].y  < lm[5].y;   // index  tip above index  MCP
  const midExt  = lm[12].y < lm[9].y;   // middle tip above middle MCP
  const ringExt = lm[16].y < lm[13].y;  // ring   tip above ring   MCP
  const pinkExt = lm[20].y < lm[17].y;  // pinky  tip above pinky  MCP

  const extCount = [idxExt, midExt, ringExt, pinkExt].filter(Boolean).length;

  // 3 or more fingers up = open palm / raised hand
  if (extCount >= 3) return 'palm';

  return null;
}

function clearDwell() {
  dwellGesture = null;
  dwellTeam    = -1;
  dwellStart   = 0;
  if (dwellRafId) { cancelAnimationFrame(dwellRafId); dwellRafId = null; }
  dwellWrap.style.display = 'none';
  dwellBar.style.width    = '0%';
}

function tickDwell() {
  if (!dwellGesture) return;
  const pct = Math.min((Date.now() - dwellStart) / DWELL_MS, 1);
  dwellBar.style.width = (pct * 100) + '%';

  if (pct >= 1) {
    // Fire!
    changeScore(dwellTeam, 1, 'gesture');
    gestureCd = true;
    setTimeout(() => gestureCd = false, 2200);
    clearDwell();
    return;
  }
  dwellRafId = requestAnimationFrame(tickDwell);
}

function onHandResults(results) {
  if (!results.multiHandLandmarks || !results.multiHandLandmarks.length) {
    clearDwell();
    return;
  }

  const lm      = results.multiHandLandmarks[0];
  const gesture = detectGesture(lm);

  // Team: use mirrored x (so camera-left = Team 1, camera-right = Team 2)
  const mirX = 1 - lm[0].x;
  const team = mirX < 0.5 ? 0 : 1;

  if (!gesture || gestureCd) {
    clearDwell();
    return;
  }

  // Dwell logic — start or continue hold
  if (dwellGesture === gesture && dwellTeam === team) {
    // Same gesture continuing; tickDwell handles the bar via rAF
  } else {
    clearDwell();
    dwellGesture = gesture;
    dwellTeam    = team;
    dwellStart   = Date.now();
    // Position bar on the scoring side, coloured to match the team
    if (team === 0) {
      dwellWrap.style.left  = '0';
      dwellWrap.style.right = 'auto';
      dwellBar.style.background  = '#00e5ff';
      dwellBar.style.boxShadow   = '0 0 22px 6px rgba(0,229,255,.8)';
    } else {
      dwellWrap.style.left  = 'auto';
      dwellWrap.style.right = '0';
      dwellBar.style.background  = '#e040fb';
      dwellBar.style.boxShadow   = '0 0 22px 6px rgba(224,64,251,.8)';
    }
    dwellWrap.style.display = 'block';
    dwellRafId = requestAnimationFrame(tickDwell);
  }
}

async function startCamera() {
  if (!window.Hands) {
    showToast('⚠ MediaPipe not loaded — check internet');
    return false;
  }
  try {
    // Set up MediaPipe Hands
    mpHands = new Hands({
      locateFile: f =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
    });
    mpHands.setOptions({
      maxNumHands:            1,
      modelComplexity:        0,
      minDetectionConfidence: 0.62,
      minTrackingConfidence:  0.62,
    });
    mpHands.onResults(onHandResults);

    // getUserMedia works on iOS Safari; no camera_utils needed
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 328 }, height: { ideal: 246 } },
      audio: false,
    });
    vidEl.srcObject = stream;
    await new Promise(resolve => {
      vidEl.onloadedmetadata = resolve;
      setTimeout(resolve, 3000); // safety fallback
    });
    await vidEl.play();

    // Frame loop — awaits each send so we never queue up multiple frames
    async function frameLoop() {
      if (!cameraOn) return;
      if (vidEl.readyState >= 2) {
        try { await mpHands.send({ image: vidEl }); } catch {}
      }
      if (cameraOn) mpRafId = requestAnimationFrame(frameLoop);
    }
    mpRafId = requestAnimationFrame(frameLoop);
    return true;
  } catch (e) {
    showToast('Camera: ' + (e.message || e));
    return false;
  }
}

function stopCamera() {
  clearDwell();
  if (mpRafId) { cancelAnimationFrame(mpRafId); mpRafId = null; }
  if (vidEl.srcObject) {
    vidEl.srcObject.getTracks().forEach(t => t.stop());
    vidEl.srcObject = null;
  }
  if (mpHands) { mpHands.close(); mpHands = null; }
}

btnCam.addEventListener('click', async () => {
  cameraOn = !cameraOn;
  if (cameraOn) {
    showToast('Starting camera…');
    cameraOn = await startCamera();
    if (cameraOn) {
      btnCam.classList.add('on');
      showToast('📷 Gesture: 🖐 raise hand & hold = +1  ·  position = team');
    } else {
      cameraOn = false;
    }
  } else {
    stopCamera();
    btnCam.classList.remove('on');
    showToast('Camera OFF');
  }
});

/* ════════════════════════════════════════════════════════
   RESET BUTTON  (hold 1.5 s to reset)
════════════════════════════════════════════════════════ */
let resetTimer   = null;
let resetHolding = false;

function startReset(e) {
  e.preventDefault();
  resetHolding = true;
  btnReset.style.background    = 'rgba(255,160,0,.35)';
  btnReset.style.borderColor   = '#ffa040';
  resetTimer = setTimeout(() => {
    if (!resetHolding) return;
    resetScores();
    btnReset.style.background  = '';
    btnReset.style.borderColor = '';
    resetHolding = false;
  }, 1500);
}

function cancelReset() {
  clearTimeout(resetTimer);
  resetHolding               = false;
  btnReset.style.background  = '';
  btnReset.style.borderColor = '';
}

btnReset.addEventListener('mousedown',   startReset);
btnReset.addEventListener('touchstart',  startReset, { passive: false });
btnReset.addEventListener('mouseup',     cancelReset);
btnReset.addEventListener('mouseleave',  cancelReset);
btnReset.addEventListener('touchend',    cancelReset);
btnReset.addEventListener('touchcancel', cancelReset);

/* ════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════ */
showToast('👋 Tap left / right to score  ·  hold ↺ to reset');
</script>
